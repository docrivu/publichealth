name: Deploy WordPress pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wordpress/**"
      - "scripts/wp-*.mjs"
      - ".github/workflows/deploy-wordpress.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy pages to WordPress
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_ALLOW_INSECURE_TLS: ${{ secrets.WP_ALLOW_INSECURE_TLS }}
        run: npm run wp:deploy
